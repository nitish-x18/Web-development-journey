    <!--Given 5 boxes, assign a random color and a random background to each box using DOM conceots-->

        <div class="box">yoooo 1</div>
        <div class="box">yoooo 2</div>
        <div class="box">yoooo 3</div>
        <div class="box">yoooo 4</div>

    <script>
        // let boxes = document.getElementsByClassName("box")
        // console.log(boxes)

        let boxes = document.querySelector(".container").children
        console.log(boxes)

        function getrandom(){
            val2 = Math.ceil(0 + Math.random() * 255)
            val1 = Math.ceil(0 + Math.random() * 255)
            val3 = Math.ceil(0 + Math.random() * 255)

            return `rgb(${val1}, ${val2}, ${val3})`
        }

        Array.from(boxes).forEach(e => {
            e.style.backgroundColor = getrandom();
            e.style.Color = getrandom();
